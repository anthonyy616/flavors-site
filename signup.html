<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Sign Up - Flavors Sweet Slice</title>
  <meta name="description" content="Create your Flavors Sweet Slice account."/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Manrope', sans-serif;
      background-color: #FDF9F3;
      color: #3D1D16;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Glass header */
    .glass-header {
      background: rgba(253, 249, 243, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(213, 194, 191, 0.3);
    }

    /* Card ambient shadow */
    .card-shadow {
      box-shadow: 0 4px 32px rgba(61,29,22,0.07), 0 1px 4px rgba(61,29,22,0.04);
    }

    /* Material Symbols */
    .sym { font-family: 'Material Symbols Outlined'; user-select: none; }
    .sym-fill { font-variation-settings: 'FILL' 1; }

    /* Reveal animation */
    .reveal {
      opacity: 0; transform: translateY(24px);
      transition: opacity 0.65s cubic-bezier(0.22,1,0.36,1), transform 0.65s cubic-bezier(0.22,1,0.36,1);
    }
    .reveal.in { opacity: 1; transform: none; }

    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 28px; border-radius: 9999px;
      background: #3D1D16; color: #fff;
      font-family: 'Inter',sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.02em;
      border: none; cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 4px 16px rgba(61,29,22,0.25);
    }
    .btn-primary:hover { background: #230904; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { background: #837470; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Input fields */
    .input-field {
      width: 100%; padding: 12px 16px;
      background: #F0EDED; border: 1.5px solid transparent; border-radius: 0.75rem;
      font-family: 'Manrope', sans-serif; font-size: 15px; color: #3D1D16;
      outline: none; transition: border-color 0.2s, background 0.2s;
    }
    .input-field::placeholder { color: #837470; }
    .input-field:focus { border-color: #3D1D16; background: #fff; }

    .nav-link {
      font-family: 'Inter',sans-serif; font-size: 14px; font-weight: 600;
      color: #3D1D16; text-decoration: none; position: relative; transition: opacity 0.2s;
    }
    .nav-link.muted { color: #605e5a; }
    .nav-link::after {
      content:''; position:absolute; bottom:-2px; left:0; width:0; height:2px;
      background:#C8102E; border-radius:2px; transition: width 0.25s;
    }
    .nav-link:hover::after, .nav-link.active::after { width:100%; }

  </style>
</head>

<body>

<!-- TOP APP BAR -->
<header id="top-bar" class="glass-header fixed top-0 w-full z-50 h-16 flex items-center justify-between px-5 md:px-8 transition-shadow duration-300">
  <div class="flex items-center gap-4">
    <a href="homepage.html" class="font-bold text-[18px] tracking-tight text-[#3D1D16] leading-none" style="font-family:'Manrope',sans-serif;">Flavors Sweet Slice</a>
  </div>
  <nav class="hidden md:flex gap-8 items-center">
    <a href="homepage.html" class="nav-link muted">Home</a>
    <a href="menu.html" class="nav-link muted">Menu</a>
    <a href="design.html" class="nav-link muted">Custom</a>
    <a href="cart.html" class="nav-link muted">Cart</a>
  </nav>
  <div class="flex items-center gap-3">
    <a href="login.html" class="font-medium text-[13px] text-[#605e5a] hover:text-[#3D1D16] transition-colors hidden md:block" style="font-family:'Inter',sans-serif;">Login</a>
    <a href="login.html" class="btn-primary" style="padding:10px 20px;font-size:13px;">Login</a>
  </div>
</header>

<!-- MAIN -->
<main class="flex-grow pt-24 pb-20 flex items-center justify-center px-5">
  
  <div class="bg-white rounded-2xl card-shadow w-full max-w-lg p-8 md:p-10 reveal in">
    
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4" style="background:#3d1d16; box-shadow:0 0 0 4px rgba(61,29,22,0.08);">
        <span class="sym sym-fill text-white" style="font-size:24px;">person_add</span>
      </div>
      <h1 class="font-bold text-[28px] text-[#3D1D16] tracking-tight mb-2" style="font-family:'Manrope',sans-serif;">Create Account</h1>
      <p class="text-[14px] text-[#605e5a]" style="font-family:'Manrope',sans-serif;">Join Flavors Sweet Slice to order your dream cakes</p>
    </div>

    <!-- Signup Form -->
    <form id="signup-form" class="flex flex-col gap-5">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label for="first_name" class="block text-[13px] font-semibold text-[#605e5a] mb-1.5" style="font-family:'Inter',sans-serif;">First Name</label>
          <input type="text" id="first_name" required placeholder="John" class="input-field">
        </div>
        <div>
          <label for="last_name" class="block text-[13px] font-semibold text-[#605e5a] mb-1.5" style="font-family:'Inter',sans-serif;">Last Name</label>
          <input type="text" id="last_name" required placeholder="Doe" class="input-field">
        </div>
      </div>

      <div>
        <label for="email" class="block text-[13px] font-semibold text-[#605e5a] mb-1.5" style="font-family:'Inter',sans-serif;">Email Address</label>
        <input type="email" id="email" required placeholder="john@example.com" class="input-field">
      </div>

      <div>
        <label for="phone" class="block text-[13px] font-semibold text-[#605e5a] mb-1.5" style="font-family:'Inter',sans-serif;">Phone Number <span class="font-normal opacity-70">(Optional)</span></label>
        <input type="tel" id="phone" placeholder="+2348000000000" class="input-field">
      </div>

      <div>
        <label for="password" class="block text-[13px] font-semibold text-[#605e5a] mb-1.5" style="font-family:'Inter',sans-serif;">Password</label>
        <input type="password" id="password" required minlength="6" placeholder="At least 6 characters" class="input-field">
      </div>

      <button type="submit" class="btn-primary w-full mt-2" style="padding:14px; font-size:15px;">Create Account</button>
    </form>

    <div id="status" class="mt-5 p-3.5 rounded-xl text-center hidden text-[13px] font-semibold" style="font-family:'Inter',sans-serif;"></div>

    <div class="mt-8 text-center pt-6 border-t" style="border-color:rgba(213,194,191,0.3);">
      <p class="text-[14px] text-[#605e5a]" style="font-family:'Manrope',sans-serif;">
        Already have an account? 
        <a href="login.html" class="font-semibold text-[#C8102E] hover:opacity-80 transition-opacity ml-1">Login</a>
      </p>
    </div>

  </div>
</main>

<script>
  /* ── Nav shadow ─── */
  window.addEventListener('scroll', () => {
    document.getElementById('top-bar').style.boxShadow = window.scrollY > 12 ? '0 4px 24px rgba(61,29,22,0.1)' : 'none';
  }, { passive: true });

  // Supabase Configuration
  const supabaseUrl = env.SUPABASE_URL;
  const supabaseKey = env.SUPABASE_KEY;

  // Initialize Supabase client correctly
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey, {
      auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
      }
  });

  // Signup function
  async function signUpUser(event) {
      event.preventDefault();

      const first_name = document.getElementById('first_name').value.trim();
      const last_name = document.getElementById('last_name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const statusDiv = document.getElementById('status');

      // Show loading state
      const submitBtn = event.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;
      submitBtn.textContent = 'Creating Account...';
      submitBtn.disabled = true;

      try {
          //  1: Sign up w/ Supabase Auth
          const { data: authData, error: authError } = await supabase.auth.signUp({
              email: email,
              password: password,
              options: {
                  data: {
                      first_name: first_name,
                      last_name: last_name,
                      phone: phone
                  }
              }
          });

          if (authError) {
              throw new Error(authError.message);
          }

          if (authData.user) {
              // Step 2: Create profile in profiles table
              const { error: profileError } = await supabase
                  .from('profiles')
                  .insert({
                      id: authData.user.id,
                      first_name: first_name,
                      last_name: last_name,
                      phone: phone,
                      email: email,
                      created_at: new Date().toISOString()
                  });

              if (profileError) {
                  console.warn('Profile creation warning:', profileError.message);
              }

              // Store profile immediately in localStorage
              localStorage.setItem('userProfile', JSON.stringify({
                  first_name: first_name,
                  last_name: last_name,
                  email: email,
                  phone: phone
              }));

              // Show success message
              statusDiv.className = 'mt-5 p-3.5 rounded-xl text-center bg-green-50 text-green-700 text-[13px] font-semibold';
              statusDiv.innerHTML = `Account created successfully. Redirecting...`;
              statusDiv.classList.remove('hidden');

              // Redirect to homepage immediately
              setTimeout(() => { window.location.href = 'homepage.html'; }, 500);
          }

      } catch (error) {
          statusDiv.className = 'mt-5 p-3.5 rounded-xl text-center bg-red-50 text-red-700 text-[13px] font-semibold';
          statusDiv.textContent = error.message;
          statusDiv.classList.remove('hidden');
      } finally {
          submitBtn.textContent = originalText;
          submitBtn.disabled = false;
      }
  }

  document.getElementById('signup-form').addEventListener('submit', signUpUser);

  // Check if user is already logged in
  supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) {
          window.location.href = 'homepage.html';
      }
  });
</script>
<script src="auth.js" defer></script>
</body>
</html>
