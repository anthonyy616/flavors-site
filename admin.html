<!DOCTYPE html>
<html class="scroll-smooth" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Admin Dashboard - Flavors Sweet Slice</title>
  <meta name="description" content="Admin dashboard to manage orders." />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    rel="stylesheet" />
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-client.js"></script>
  <style>
    *,*::before,*::after { box-sizing: border-box; }
    body {
      font-family: 'Manrope', sans-serif;
      background-color: #FDF9F3;
      color: #3D1D16;
      -webkit-font-smoothing: antialiased;
    }
    .glass-header {
      background: rgba(253, 249, 243, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(213, 194, 191, 0.3);
    }
    .card-shadow { box-shadow: 0 4px 24px rgba(61, 29, 22, 0.06), 0 1px 3px rgba(61, 29, 22, 0.04); }
    .sym { font-family: 'Material Symbols Outlined'; user-select: none; }
    .sym-fill { font-variation-settings: 'FILL' 1; }

    /* Admin specific styles */
    .status-select {
      padding: 6px 30px 6px 12px;
      border-radius: 9999px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid #d5c2bf;
      background-color: white;
      cursor: pointer;
      outline: none;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%233D1D16%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 10px top 50%;
      background-size: 10px auto;
    }
    
    .status-pending       { background-color:#FEF3C7; color:#92400E; border-color:#FDE68A; }
    .status-confirmed     { background-color:#D1FAE5; color:#065F46; border-color:#A7F3D0; }
    .status-baking        { background-color:#FDE68A; color:#78350F; border-color:#FCD34D; }
    .status-out_for_delivery { background-color:#DBEAFE; color:#1E40AF; border-color:#BFDBFE; }
    .status-delivered     { background-color:#D1FAE5; color:#065F46; border-color:#A7F3D0; }
    .status-cancelled     { background-color:#FEE2E2; color:#991B1B; border-color:#FECACA; }

  </style>
</head>

<body>

  <header id="top-bar" class="glass-header fixed top-0 w-full z-50 h-16 flex items-center justify-between px-5 md:px-8">
    <div class="flex items-center gap-4">
      <span class="font-bold text-[18px] tracking-tight text-[#3D1D16]" style="font-family:'Manrope',sans-serif;">Flavors Admin</span>
    </div>
    <div class="flex items-center gap-4">
      <a href="index.html" class="text-[14px] font-semibold text-[#605e5a] hover:text-[#3D1D16] transition-colors" style="font-family:'Inter',sans-serif;">Back to Site</a>
      <button onclick="logoutAdmin()" class="text-[14px] font-semibold text-[#C8102E] hover:opacity-80 transition-colors" style="font-family:'Inter',sans-serif;">Logout</button>
    </div>
  </header>

  <main class="pt-24 pb-20 max-w-[1200px] mx-auto px-5 md:px-8 hidden" id="admin-main">
    
    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="stats-container">
      <div class="bg-white rounded-xl card-shadow p-5 text-center">
        <h3 class="text-[13px] font-semibold text-[#605e5a] uppercase tracking-wider mb-1" style="font-family:'Inter',sans-serif;">Pending</h3>
        <p class="text-[28px] font-bold text-[#3D1D16]" id="stat-pending">0</p>
      </div>
      <div class="bg-white rounded-xl card-shadow p-5 text-center">
        <h3 class="text-[13px] font-semibold text-[#605e5a] uppercase tracking-wider mb-1" style="font-family:'Inter',sans-serif;">Confirmed</h3>
        <p class="text-[28px] font-bold text-[#3D1D16]" id="stat-confirmed">0</p>
      </div>
      <div class="bg-white rounded-xl card-shadow p-5 text-center">
        <h3 class="text-[13px] font-semibold text-[#605e5a] uppercase tracking-wider mb-1" style="font-family:'Inter',sans-serif;">Baking</h3>
        <p class="text-[28px] font-bold text-[#3D1D16]" id="stat-baking">0</p>
      </div>
      <div class="bg-white rounded-xl card-shadow p-5 text-center">
        <h3 class="text-[13px] font-semibold text-[#605e5a] uppercase tracking-wider mb-1" style="font-family:'Inter',sans-serif;">Out for Del.</h3>
        <p class="text-[28px] font-bold text-[#3D1D16]" id="stat-out">0</p>
      </div>
    </div>

    <!-- Orders Table -->
    <div class="bg-white rounded-2xl card-shadow overflow-hidden">
      <div class="p-6 border-b border-[#F0EDED] flex items-center justify-between">
        <h2 class="text-[20px] font-bold text-[#3D1D16]" style="font-family:'Manrope',sans-serif;">Recent Orders</h2>
        <button onclick="loadAdminOrders()" class="sym text-[#605e5a] hover:text-[#3D1D16]" title="Refresh">refresh</button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse min-w-[800px]">
          <thead>
            <tr class="bg-[#FDF9F3] border-b border-[#F0EDED] text-[13px] font-semibold text-[#837470] uppercase tracking-wider" style="font-family:'Inter',sans-serif;">
              <th class="p-4">Order ID & Date</th>
              <th class="p-4">Customer</th>
              <th class="p-4">Items Summary</th>
              <th class="p-4">Total</th>
              <th class="p-4">Status</th>
            </tr>
          </thead>
          <tbody id="admin-orders-body" class="divide-y divide-[#F0EDED]">
            <tr><td colspan="5" class="p-8 text-center text-[#605e5a]">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script>
    const validStatuses = ['pending', 'confirmed', 'baking', 'out_for_delivery', 'delivered', 'cancelled'];
    
    async function initAdmin() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = 'index.html';
        return;
      }
      
      // Check admin status
      const { data, error } = await supabaseClient
        .from('admin_users')
        .select('id')
        .eq('user_id', session.user.id)
        .single();
        
      if (error || !data) {
        alert("Access Denied: You are not an administrator.");
        window.location.href = 'index.html';
        return;
      }

      document.getElementById('admin-main').classList.remove('hidden');
      loadAdminOrders();
    }

    async function loadAdminOrders() {
      const tbody = document.getElementById('admin-orders-body');
      
      // Fetch orders with user profiles and items
      const { data: orders, error } = await supabaseClient
        .from('orders')
        .select(`
          id, status, total, paystack_verified, created_at, delivery_address,
          profiles:user_id ( full_name, email, phone ),
          order_items ( id, name, quantity, reference_photo_url )
        `)
        .order('created_at', { ascending: false });

      if (error) {
        tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-red-600">Error loading orders: ${error.message}</td></tr>`;
        return;
      }

      if (!orders || orders.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-[#605e5a]">No orders found.</td></tr>`;
        updateStats([]);
        return;
      }

      updateStats(orders);

      tbody.innerHTML = orders.map(order => {
        const date = new Date(order.created_at).toLocaleString('en-NG', { dateStyle: 'short', timeStyle: 'short' });
        const customerName = order.profiles?.full_name || 'Unknown User';
        const customerEmail = order.profiles?.email || '';
        const customerPhone = order.profiles?.phone || '';
        
        let itemsHtml = order.order_items.map(it => {
          let str = `<span class="font-medium">${it.quantity}x</span> ${it.name}`;
          if (it.reference_photo_url) {
            str += ` <a href="${it.reference_photo_url}" target="_blank" class="text-blue-600 hover:underline" title="View Reference Photo"><span class="sym" style="font-size:14px;vertical-align:middle;">image</span></a>`;
          }
          return str;
        }).join('<br>');

        const optionsHtml = validStatuses.map(st => 
          `<option value="${st}" ${order.status === st ? 'selected' : ''}>${st.replace(/_/g, ' ')}</option>`
        ).join('');

        return `
          <tr class="hover:bg-[#FDF9F3] transition-colors" style="font-family:'Inter',sans-serif; font-size:14px; color:#3D1D16;">
            <td class="p-4 align-top">
              <span class="block text-[11px] font-mono text-[#837470]">${order.id.split('-')[0]}</span>
              <span class="block mt-1">${date}</span>
              ${order.paystack_verified ? '<span class="inline-block mt-1 text-[10px] font-bold text-green-700 bg-green-100 px-2 py-0.5 rounded">PAID</span>' : '<span class="inline-block mt-1 text-[10px] font-bold text-orange-700 bg-orange-100 px-2 py-0.5 rounded">UNPAID</span>'}
            </td>
            <td class="p-4 align-top">
              <span class="block font-semibold">${customerName}</span>
              <span class="block text-[12px] text-[#605e5a] mt-0.5">${customerEmail}</span>
              <span class="block text-[12px] text-[#605e5a] mt-0.5">${customerPhone}</span>
            </td>
            <td class="p-4 align-top leading-relaxed text-[13px]">
              ${itemsHtml}
              ${order.delivery_address ? `<div class="mt-2 pt-2 border-t border-[#F0EDED] text-[12px]"><span class="font-semibold">Delivery:</span> ${order.delivery_address}</div>` : ''}
            </td>
            <td class="p-4 align-top font-bold text-[#C8102E]">
              ₦${order.total.toLocaleString()}
            </td>
            <td class="p-4 align-top">
              <select 
                class="status-select status-${order.status}" 
                onchange="updateOrderStatus('${order.id}', this.value, this)"
              >
                ${optionsHtml}
              </select>
            </td>
          </tr>
        `;
      }).join('');
    }

    function updateStats(orders) {
      let counts = { pending: 0, confirmed: 0, baking: 0, out_for_delivery: 0 };
      orders.forEach(o => {
        if (counts[o.status] !== undefined) counts[o.status]++;
      });
      document.getElementById('stat-pending').textContent = counts.pending;
      document.getElementById('stat-confirmed').textContent = counts.confirmed;
      document.getElementById('stat-baking').textContent = counts.baking;
      document.getElementById('stat-out').textContent = counts.out_for_delivery;
    }

    async function updateOrderStatus(orderId, newStatus, selectElement) {
      selectElement.disabled = true;
      const { error } = await supabaseClient
        .from('orders')
        .update({ status: newStatus })
        .eq('id', orderId);
        
      if (error) {
        alert("Failed to update status: " + error.message);
        loadAdminOrders(); // revert
      } else {
        // Update class for colors
        selectElement.className = `status-select status-${newStatus}`;
        
        // Re-calculate stats (requires full re-fetch or manual DOM count. Re-fetch is safer)
        loadAdminOrders();
      }
      selectElement.disabled = false;
    }

    async function logoutAdmin() {
      await supabaseClient.auth.signOut();
      window.location.href = 'index.html';
    }

    document.addEventListener('DOMContentLoaded', initAdmin);
  </script>
</body>
</html>
