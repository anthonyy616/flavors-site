<!DOCTYPE html>
<html class="scroll-smooth" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Login - Flavors Sweet Slice</title>
  <meta name="description" content="Login to your Flavors Sweet Slice account." />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    rel="stylesheet" />
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-client.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background-color: #FDF9F3;
      color: #3D1D16;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Glass header */
    .glass-header {
      background: rgba(253, 249, 243, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(213, 194, 191, 0.3);
    }

    /* Card ambient shadow */
    .card-shadow {
      box-shadow: 0 4px 32px rgba(61, 29, 22, 0.07), 0 1px 4px rgba(61, 29, 22, 0.04);
    }

    /* Material Symbols */
    .sym {
      font-family: 'Material Symbols Outlined';
      user-select: none;
    }

    .sym-fill {
      font-variation-settings: 'FILL' 1;
    }

    /* Reveal animation */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.65s cubic-bezier(0.22, 1, 0.36, 1), transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .reveal.in {
      opacity: 1;
      transform: none;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: 9999px;
      background: #3D1D16;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 4px 16px rgba(61, 29, 22, 0.25);
    }

    .btn-primary:hover {
      background: #230904;
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .btn-primary:disabled {
      background: #837470;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Input fields */
    .input-field {
      width: 100%;
      padding: 12px 16px;
      background: #F0EDED;
      border: 1.5px solid transparent;
      border-radius: 0.75rem;
      font-family: 'Manrope', sans-serif;
      font-size: 15px;
      color: #3D1D16;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .input-field::placeholder {
      color: #837470;
    }

    .input-field:focus {
      border-color: #3D1D16;
      background: #fff;
    }

    .nav-link {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #3D1D16;
      text-decoration: none;
      position: relative;
      transition: opacity 0.2s;
    }

    .nav-link.muted {
      color: #605e5a;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: #C8102E;
      border-radius: 2px;
      transition: width 0.25s;
    }

    .nav-link:hover::after,
    .nav-link.active::after {
      width: 100%;
    }
  </style>
</head>

<body>

  <!-- TOP APP BAR -->
  <header id="top-bar"
    class="glass-header fixed top-0 w-full z-50 h-16 flex items-center justify-between px-5 md:px-8 transition-shadow duration-300">
    <div class="flex items-center gap-4">
      <a href="index.html" class="font-bold text-[18px] tracking-tight text-[#3D1D16] leading-none"
        style="font-family:'Manrope',sans-serif;">Flavors Sweet Slice</a>
    </div>
    <nav class="hidden md:flex gap-8 items-center">
      <a href="index.html" class="nav-link muted">Home</a>
      <a href="menu.html" class="nav-link muted">Menu</a>
      <a href="design.html" class="nav-link muted">Custom</a>
      <a href="cart.html" class="nav-link muted">Cart</a>
    </nav>
    <div class="flex items-center gap-3">
      <a href="signup.html" class="font-medium text-[13px] text-[#605e5a] hover:text-[#3D1D16] transition-colors"
        style="font-family:'Inter',sans-serif;">Sign Up</a>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-grow pt-24 pb-20 flex items-center justify-center px-5">

    <div class="bg-white rounded-2xl card-shadow w-full max-w-md p-8 md:p-10 reveal in">

      <!-- Header -->
      <div class="text-center mb-8">
        <div class="w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4"
          style="background:#3d1d16; box-shadow:0 0 0 4px rgba(61,29,22,0.08);">
          <span class="sym sym-fill text-white" style="font-size:24px;">lock</span>
        </div>
        <h1 class="font-bold text-[28px] text-[#3D1D16] tracking-tight mb-2" style="font-family:'Manrope',sans-serif;">
          Welcome Back</h1>
        <p class="text-[14px] text-[#605e5a]" style="font-family:'Manrope',sans-serif;">Sign in to continue to Flavors
          Sweet Slice</p>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="flex flex-col gap-5">
        <div>
          <label for="login_id" class="block text-[13px] font-semibold text-[#605e5a] mb-1.5"
            style="font-family:'Inter',sans-serif;">Email Address</label>
          <input type="email" id="login_id" required placeholder="Enter your email" class="input-field">
        </div>

        <div>
          <label for="password" class="block text-[13px] font-semibold text-[#605e5a] mb-1.5"
            style="font-family:'Inter',sans-serif;">Password</label>
          <input type="password" id="password" required placeholder="••••••••" class="input-field">
        </div>

        <div class="flex items-center justify-between mt-1">
          <label class="flex items-center cursor-pointer group">
            <input type="checkbox" id="remember-me"
              class="rounded border-[#d5c2bf] text-[#3D1D16] focus:ring-[#3D1D16] w-4 h-4 transition-colors">
            <span class="ml-2 text-[13px] text-[#605e5a] group-hover:text-[#3D1D16] transition-colors"
              style="font-family:'Inter',sans-serif;">Remember me</span>
          </label>
          <a href="#" id="forgot-password-link"
            class="text-[13px] font-semibold text-[#C8102E] hover:opacity-80 transition-opacity"
            style="font-family:'Inter',sans-serif;">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary w-full mt-2" style="padding:14px; font-size:15px;">Sign In</button>
      </form>

      <!-- Forgot Password Form -->
      <form id="forgot-password-form" class="hidden flex flex-col gap-5">
        <div>
          <label for="reset-email" class="block text-[13px] font-semibold text-[#605e5a] mb-1.5"
            style="font-family:'Inter',sans-serif;">Email Address</label>
          <input type="email" id="reset-email" required placeholder="Enter your email" class="input-field">
        </div>

        <button type="button" id="reset-password" class="btn-primary w-full mt-2"
          style="padding:14px; font-size:15px;">Send Reset Link</button>

        <div class="text-center mt-2">
          <a href="#" id="back-to-login"
            class="text-[13px] font-semibold text-[#605e5a] hover:text-[#3D1D16] transition-colors"
            style="font-family:'Inter',sans-serif;">← Back to login</a>
        </div>
      </form>

      <div id="status" class="mt-5 p-3.5 rounded-xl text-center hidden text-[13px] font-semibold"
        style="font-family:'Inter',sans-serif;"></div>

      <div class="mt-8 text-center pt-6 border-t" style="border-color:rgba(213,194,191,0.3);">
        <p class="text-[14px] text-[#605e5a]" style="font-family:'Manrope',sans-serif;">
          Don't have an account?
          <a href="signup.html" class="font-semibold text-[#C8102E] hover:opacity-80 transition-opacity ml-1">Sign
            up</a>
        </p>
      </div>

    </div>
  </main>

  <script>
    /* ── Nav shadow ─── */
    window.addEventListener('scroll', () => {
      document.getElementById('top-bar').style.boxShadow = window.scrollY > 12 ? '0 4px 24px rgba(61,29,22,0.1)' : 'none';
    }, { passive: true });

    // Use shared Supabase client
    const supabase = window.supabaseClient;

    // Login function
    async function loginUser(event) {
      event.preventDefault();

      const login_id = document.getElementById('login_id').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('remember-me').checked;
      const statusDiv = document.getElementById('status');

      // Show loading state
      const submitBtn = event.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;
      submitBtn.textContent = 'Signing in...';
      submitBtn.disabled = true;

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: login_id,
          password: password
        });

        if (error) {
          throw new Error(error.message);
        }

        if (data.user) {
          // Fetch user profile
          const { data: profile, error: profileError } = await supabase
            .from('profiles')
            .select('*')
            .eq('id', data.user.id)
            .single();

          // Store profile locally (even if there's an error fetching it)
          if (!profileError && profile) {
            localStorage.setItem('userProfile', JSON.stringify(profile));
          }

          // Store session preference
          if (rememberMe) {
            localStorage.setItem('rememberMe', 'true');
          }

          // Show success message
          statusDiv.className = 'mt-5 p-3.5 rounded-xl text-center bg-green-50 text-green-700 text-[13px] font-semibold';
          statusDiv.innerHTML = 'Logged in successfully. Redirecting...';
          statusDiv.classList.remove('hidden');

          // Redirect after success
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1000);
        }

      } catch (error) {
        statusDiv.className = 'mt-5 p-3.5 rounded-xl text-center bg-red-50 text-red-700 text-[13px] font-semibold';
        statusDiv.textContent = error.message;
        statusDiv.classList.remove('hidden');
      } finally {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    }

    // Password reset function
    async function resetPassword(event) {
      event.preventDefault();

      const resetEmail = document.getElementById('reset-email').value.trim();
      const statusDiv = document.getElementById('status');
      const resetBtn = document.getElementById('reset-password');

      // Show loading state
      const originalText = resetBtn.textContent;
      resetBtn.textContent = 'Sending...';
      resetBtn.disabled = true;

      try {
        const { error } = await supabase.auth.resetPasswordForEmail(resetEmail, {
          redirectTo: `${window.location.origin}/reset-password.html`
        });

        if (error) {
          throw new Error(error.message);
        }

        statusDiv.className = 'mt-5 p-3.5 rounded-xl text-center bg-green-50 text-green-700 text-[13px] font-semibold';
        statusDiv.textContent = 'Password reset link sent to your email!';
        statusDiv.classList.remove('hidden');

        setTimeout(() => { showLoginForm(); }, 3000);

      } catch (error) {
        statusDiv.className = 'mt-5 p-3.5 rounded-xl text-center bg-red-50 text-red-700 text-[13px] font-semibold';
        statusDiv.textContent = error.message;
        statusDiv.classList.remove('hidden');
      } finally {
        resetBtn.textContent = originalText;
        resetBtn.disabled = false;
      }
    }

    // Form visibility functions
    function showForgotPasswordForm() {
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('forgot-password-form').classList.remove('hidden');
      document.getElementById('status').classList.add('hidden');
      document.querySelector('h1').textContent = 'Reset Password';
      document.querySelector('.text-\\[14px\\]').textContent = 'Enter your email to receive a reset link';
    }

    function showLoginForm() {
      document.getElementById('forgot-password-form').classList.add('hidden');
      document.getElementById('login-form').classList.remove('hidden');
      document.getElementById('status').classList.add('hidden');
      document.querySelector('h1').textContent = 'Welcome Back';
      document.querySelector('.text-\\[14px\\]').textContent = 'Sign in to continue to Flavors Sweet Slice';
    }

    // Event listeners
    document.getElementById('login-form').addEventListener('submit', loginUser);
    document.getElementById('forgot-password-link').addEventListener('click', (e) => {
      e.preventDefault();
      showForgotPasswordForm();
    });
    document.getElementById('back-to-login').addEventListener('click', (e) => {
      e.preventDefault();
      showLoginForm();
    });
    document.getElementById('reset-password').addEventListener('click', resetPassword);

    // Check if user is already logged in
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        window.location.href = 'index.html';
      }
    });

    // Auth state listener
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {
        console.log('User signed in:', session.user.email);
      } else if (event === 'SIGNED_OUT') {
        console.log('User signed out');
        localStorage.removeItem('userProfile');
      }
    });
  </script>
  <script src="auth.js" defer></script>
</body>

</html>
